{% set name = "geotorch" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/geotorch-{{ version }}.tar.gz
  sha256: fe99106d90667a93288d7e2ce349d5757475320332ccc058af270c043ed2c3f4

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - pytorch >=1.9

test:
  imports:
    - examples
    - geotorch
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Lezcano/geotorch
  summary: Constrained Optimization and Manifold Optimization in Pytorch
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - wolfv
